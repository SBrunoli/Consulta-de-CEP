<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta de CEP</title>
    <link rel="icon" type="image/x-icon" href="/assets/icons/search.svg" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/media.css" />
    <script
      src="https://kit.fontawesome.com/6da04cfc57.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header class="header">
      <h1 class="title">Consulta de CEP</h1>
      <h3 class="subtitle">
        Descubra rapidamente o endereço de qualquer CEP do Brasil.
      </h3>
    </header>

    <main class="main">
      <form action="#" class="form">
        <input
          type="text"
          id="cepInput"
          class="cepInput"
          placeholder="Digite seu CEP"
        />

        <input type="submit" value="Buscar" class="btn" />
      </form>

      <div id="infos" class="infos">
        <p><strong>Logradouro:</strong> <span id="logradouro"></span></p>

        <p><strong>Estado:</strong> <span id="estado"></span></p>

        <p><strong>UF:</strong> <span id="uf"></span></p>

        <p><strong>Bairro:</strong> <span id="bairro"></span></p>

        <p><strong>Região:</strong> <span id="regiao"></span></p>

        <p><strong>Localidade:</strong> <span id="localidade"></span></p>
      </div>
    </main>

    <footer>
      Criado e desenvolvido por
      <a href="https://github.com/SBrunoli" target="_blank">
        Bruno de O. Ribeiro
      </a>
      <i class="fa-brands fa-github" style="color: rgb(255, 255, 255)"></i>
    </footer>

    <script src="/assets/js/script.js"></script>
  </body>
</html>
